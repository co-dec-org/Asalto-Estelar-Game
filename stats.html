<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stellar Assault — Panel de estadísticas</title>
<style>
  :root{--bg:#000a18;--panel:#06182b;--line:#0ef3;--cyan:#00eeff;--green:#00ff88;--amber:#ffaa55;--txt:#cfeffff0;--dim:#7fb}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:radial-gradient(circle at 50% 0%,#02152a,#000);color:var(--txt);
    font-family:ui-monospace,Menlo,Consolas,monospace;min-height:100vh;padding:28px 18px}
  .wrap{max-width:780px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px}
  h1{color:var(--cyan);font-size:22px;letter-spacing:1px;text-shadow:0 0 16px #0ef7}
  .sub{color:var(--dim);font-size:12px;margin-bottom:22px}
  button{font-family:inherit;font-size:13px;color:#001018;background:var(--cyan);border:none;
    border-radius:7px;padding:8px 16px;cursor:pointer;box-shadow:0 0 14px #0ef6}
  button:hover{background:#5cf}
  .total{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px;
    display:flex;align-items:baseline;gap:14px}
  .total .n{font-size:42px;font-weight:bold;color:var(--cyan);text-shadow:0 0 16px #0ef6}
  .total .l{font-size:13px;color:var(--dim)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .card h2{font-size:13px;color:var(--cyan);margin-bottom:14px;letter-spacing:1px;text-transform:uppercase}
  .row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .row .k{width:84px;font-size:13px;color:var(--txt)}
  .bar{flex:1;height:16px;background:#0a2030;border-radius:8px;overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:8px;transition:width .5s}
  .row .v{width:42px;text-align:right;font-size:13px;color:#fff}
  .note{background:#1a1206;border:1px solid var(--amber);border-radius:12px;padding:16px 18px;color:#ffd9a8;font-size:13px;line-height:1.6}
  .foot{margin-top:20px;font-size:11px;color:#5a7d92;text-align:center}
  code{background:#0a2030;padding:1px 6px;border-radius:4px;color:var(--cyan)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>STELLAR ASSAULT · Panel</h1>
    <button id="refresh">↻ Actualizar</button>
  </header>
  <div class="sub">Estadísticas anónimas del auto-test de dispositivo — <span id="ts">cargando…</span></div>
  <div id="content"><div class="note">Cargando datos…</div></div>
  <div class="foot">Datos anónimos (sin información personal). Fuente: <code>GET /api/stats.js</code></div>
</div>

<script>
const ENDPOINT = "/api/stats.js";
const el = id => document.getElementById(id);

function bar(label, value, max, color) {
  const pct = max > 0 ? Math.round((value / max) * 100) : 0;
  return `<div class="row"><span class="k">${label}</span>
    <span class="bar"><span style="width:${pct}%;background:${color}"></span></span>
    <span class="v">${value}</span></div>`;
}

function render(d) {
  el('ts').textContent = new Date().toLocaleString();

  if (!d || d.kv === false) {
    el('content').innerHTML = `<div class="note">
      <b>Vercel KV aún no está activado</b>, así que todavía no se persisten datos.<br>
      Actívalo en el dashboard de Vercel → <b>Storage → Create → KV (Upstash)</b>.
      Vercel inyecta solas las variables <code>KV_REST_API_URL</code> y
      <code>KV_REST_API_TOKEN</code>; tras el redeploy, cada visita empezará a sumar aquí.
    </div>`;
    return;
  }

  const dev = d.byDevice || {}, tier = d.byTier || {};
  const devMax = Math.max(1, dev.phone || 0, dev.tablet || 0, dev.desktop || 0);
  const tierMax = Math.max(1, tier.high || 0, tier.low || 0);

  el('content').innerHTML = `
    <div class="total"><span class="n">${d.total || 0}</span>
      <span class="l">visitas totales<br><b style="color:var(--green)">${d.today || 0}</b> hoy</span></div>
    <div class="grid">
      <div class="card"><h2>Por dispositivo</h2>
        ${bar('📱 Phone',   dev.phone   || 0, devMax, 'linear-gradient(90deg,#0088ff,#00eeff)')}
        ${bar('▦ Tablet',  dev.tablet  || 0, devMax, 'linear-gradient(90deg,#7a5cff,#b07bff)')}
        ${bar('🖥 Desktop', dev.desktop || 0, devMax, 'linear-gradient(90deg,#00b894,#00ff88)')}
      </div>
      <div class="card"><h2>Por nivel generado</h2>
        ${bar('Capa Alta', tier.high || 0, tierMax, 'linear-gradient(90deg,#00b894,#00ff88)')}
        ${bar('Capa Baja', tier.low  || 0, tierMax, 'linear-gradient(90deg,#cc7a33,#ffaa55)')}
      </div>
    </div>`;
}

async function load() {
  el('content').innerHTML = '<div class="note">Cargando datos…</div>';
  try {
    const r = await fetch(ENDPOINT + '?ts=' + Date.now(), { cache: 'no-store' });
    render(await r.json());
  } catch (e) {
    el('content').innerHTML = '<div class="note">No se pudo leer el endpoint. ¿Está desplegado <code>/api/stats.js</code>?</div>';
  }
}

el('refresh').onclick = load;
load();
</script>
</body>
</html>
